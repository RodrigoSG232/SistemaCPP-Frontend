<header class="landing-header">
  <nav class="navbar navbar-expand-lg bg-white">
    <div class="container landing-header__container">

      <a class="navbar-brand landing-header__brand" routerLink="/">
        <img
          src="/assets/landing/logo_landing.png"
          alt="Logo Clínicas Psicología del Perú"
          class="landing-header__logo-icon"
        >

        <div class="landing-header__brand-text">
          <span>CLÍNICAS PSICOLOGÍA</span>
          <small>DEL PERÚ</small>
        </div>
      </a>

      <button
        class="navbar-toggler"
        type="button"
        aria-controls="landingNavbar"
        [attr.aria-expanded]="menuAbierto"
        aria-label="Abrir menú de navegación"
        (click)="toggleMenu()"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse landing-header__menu" [class.show]="menuAbierto" id="landingNavbar">
        <ul class="navbar-nav mb-2 mb-lg-0 landing-header__nav">
          <li class="nav-item">
            <a class="nav-link active" href="#inicio" (click)="cerrarMenu()">Inicio</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#nosotros" (click)="cerrarMenu()">Nosotros</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#especialidades" (click)="cerrarMenu()">Especialidades</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#sedes" (click)="cerrarMenu()">Sedes</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#contacto" (click)="cerrarMenu()">Contacto</a>
          </li>
        </ul>

        <a routerLink="/login" class="btn landing-header__button" (click)="cerrarMenu()">
          Acceder
        </a>
      </div>

    </div>
  </nav>
</header>
