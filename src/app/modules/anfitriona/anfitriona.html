<div class="anfitriona-container">
  <div class="emit-panel card">
    <h2>Emitir Ticket</h2>
    <p class="text-muted">Genera un nuevo número de atención para el paciente.</p>
    <button class="btn-primary btn-large" (click)="emitirTicket()" [disabled]="emitiendo">
      {{ emitiendo ? 'Generando...' : '+ Emitir Ticket' }}
    </button>

    <div class="ultimo-ticket" *ngIf="ultimoTicket">
      <p>Último ticket emitido:</p>
      <span class="ticket-numero">{{ ultimoTicket.numero }}</span>
      <button class="btn-secondary" (click)="imprimirTicket(ultimoTicket)">
        🖨️ Imprimir
      </button>
    </div>
  </div>

  <div class="lista-panel card">
    <div class="lista-header">
      <h2>Tickets de Hoy</h2>
      <button class="btn-outline" (click)="cargarTickets()">↻ Actualizar</button>
    </div>

    <div *ngIf="tickets.length === 0" class="empty">No hay tickets emitidos hoy.</div>

    <table *ngIf="tickets.length > 0">
      <thead>
        <tr>
          <th>Número</th>
          <th>Hora</th>
          <th>Estado</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let t of tickets">
          <td><strong>{{ t.numero }}</strong></td>
          <td>{{ t.fechaEmision | date:'HH:mm' }}</td>
          <td><span class="badge badge-{{ t.estado | lowercase }}">{{ t.estado }}</span></td>
          <td><button class="btn-icon" (click)="imprimirTicket(t)">🖨️</button></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
