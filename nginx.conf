server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=10s ipv6=off;

    set $backend_upstream http://backend:8080;
    set $gateway_upstream http://api-gateway:8080;

    root /usr/share/nginx/html;
    index index.html;

    # Rutas que siguen viviendo en el backend principal:
    # autenticacion, seguridad y fachadas con reglas de rol.
    location ~ ^/api/(auth|admin|psychology|public|recepcion|caja|psicologia|enfermera|anfitriona)(/|$) {
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;

        # CORS headers (backup, el backend ya los envia)
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Dominios de negocio servidos por la infraestructura de microservicios.
    location ~ ^/api/(patients|scheduling|billing|clinical|queue)(/|$) {
        proxy_pass         $gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;

        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # WebSocket del backend principal.
    location /ws {
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;
    }

    # ── SPA fallback (Angular routing) ───────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Assets con cache largo ────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Seguridad básica ──────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "no-referrer"  always;
}
